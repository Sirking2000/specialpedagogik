<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Furuviks Specialpedagogik AB – Logga</title>

  <!-- Smal, elegant font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: "Inter Tight", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .logo-wrapper {
      background: #4A6FA5;
      color: #ffffff;
      padding: 40px 60px;
      border-radius: 8px;
      text-align: center;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Vita streck */
    .line {
      width: 100%;
      height: 2px;
      background: #ffffff;
      margin: 14px 0;
      opacity: 0.9;
    }

    /* Första och andra raden matchas i bredd */
    .logo-line-1 {
      font-size: 4.5rem;
      font-weight: 300;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
    }

    .logo-line-2 {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 6px;
      letter-spacing: 0.29em; /* gör den visuellt lika bred som rad 1 */
    }

    .logo-line-3 {
      font-size: 0.95rem;
      font-weight: 300;
      opacity: 0.9;
      letter-spacing: 0.69em;
    }
  </style>
</head>
<body>
  <div class="logo-wrapper">
    <div class="line"></div>

    <div class="logo-line-1">FURUVIKS</div>
    <div class="logo-line-2">SPECIALPEDAGOGIK AB</div>
    <div class="logo-line-3">SPECIALPEDAGOGIK.COM</div>

    <div class="line"></div>
  </div>
</body>
</html>
